name: build-and-test

on:
  pull_request:
  push:
    branches: [main]

env:
  SQL_PASSWORD: "Sh0pM0no!2024"
  ASPNETCORE_ENVIRONMENT: "Test"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet restore src/ShopMono.Web/ShopMono.Web.csproj
      - run: dotnet test --no-restore
